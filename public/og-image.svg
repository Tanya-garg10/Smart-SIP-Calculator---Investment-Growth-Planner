<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F8FAFC"/>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#224C87" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3FB68B" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Main Content Area -->
  <rect x="80" y="80" width="1040" height="470" rx="20" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Icon Circle -->
  <circle cx="200" cy="315" r="80" fill="#224C87"/>
  
  <!-- Growth Chart in Circle -->
  <path d="M160 335 L170 325 L180 330 L190 315 L200 320 L210 305" stroke="#3FB68B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M210 305 L210 315 M210 305 L200 305" stroke="#3FB68B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Rupee Symbol in Circle -->
  <path d="M175 285 L185 285 M175 290 L185 290 M175 285 L175 295 C175 298 177 300 180 300 L185 300" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Title -->
  <text x="340" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#1E293B">
    Smart SIP Calculator
  </text>
  
  <!-- Subtitle -->
  <text x="340" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#64748B">
    Plan Your Investment Growth
  </text>
  
  <!-- Features -->
  <g transform="translate(340, 360)">
    <!-- Feature 1 -->
    <circle cx="0" cy="0" r="6" fill="#3FB68B"/>
    <text x="20" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569">
      Goal Visualization
    </text>
    
    <!-- Feature 2 -->
    <circle cx="220" cy="0" r="6" fill="#3FB68B"/>
    <text x="240" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569">
      Inflation Impact
    </text>
    
    <!-- Feature 3 -->
    <circle cx="420" cy="0" r="6" fill="#3FB68B"/>
    <text x="440" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569">
      What-If Scenarios
    </text>
  </g>
  
  <!-- Footer Badge -->
  <rect x="340" y="420" width="280" height="50" rx="25" fill="#224C87"/>
  <text x="480" y="453" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">
    Free Investor Education Tool
  </text>
</svg>
